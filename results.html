<!DOCTYPE html>
<html>

<head>

<title>Search Results</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<nav class="bg-white shadow p-4 flex justify-between">

<div class="font-bold text-xl">
Agentic Wallet
</div>

<a href="index.html" class="text-blue-500">
Voice Search
</a>

</nav>

<!-- RESULTS -->

<div class="p-10">

<h1 class="text-3xl font-bold mb-2">
AI Search Results
</h1>

<p id="queryText" class="text-gray-500 mb-8"></p>

<div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

</div>

<script>

/* voice query */
const query = "mouse"

document.getElementById("queryText").innerText =
"AI searching for: " + query

async function loadProducts(){

const res = await fetch("/api/rag-search",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({query})

})

const data = await res.json()

const container = document.getElementById("products")

container.innerHTML = ""

if(data.length === 0){

container.innerHTML =
"<p class='text-gray-500'>No products found</p>"

return

}

/* render results */
if(!Array.isArray(data)){
console.log("API ERROR:",data)
document.getElementById("products").innerHTML =
"<p class='text-red-500'>Search failed</p>"
return
}

data.forEach(p => {

container.innerHTML += `

<div class="bg-white p-6 rounded shadow">

<h2 class="text-lg font-semibold mb-2">
${p.name}
</h2>

<p class="text-gray-600 mb-2">
₹${p.price}
</p>

<p class="text-gray-500 text-sm mb-4">
${p.description || ""}
</p>

<button
onclick="buy(${p.price})"
class="bg-green-500 text-white px-4 py-2 rounded">
Buy Now
</button>

</div>

`

})

}

/* Razorpay payment */

async function buy(price){

const res = await fetch("/api/create-order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({amount:price})

})

const data = await res.json()

const options = {

key:data.key,
amount:data.order.amount,
currency:"INR",
order_id:data.order.id,

handler:function(){

alert("Payment Successful")

}

}

const rzp = new Razorpay(options)

rzp.open()

}

loadProducts()

</script>

</body>
</html>
