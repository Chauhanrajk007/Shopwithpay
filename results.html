<!DOCTYPE html>
<html>

<head>

<title>Search Results</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body class="bg-gray-100">

<nav class="bg-white shadow p-4 flex justify-between">

<div class="font-bold text-xl">
Agentic Wallet
</div>

<a href="index.html" class="text-blue-500">
Voice Search
</a>

</nav>

<div class="p-10">

<h1 class="text-3xl font-bold mb-2">
Search Results
</h1>

<p id="queryText" class="text-gray-500 mb-8"></p>

<div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

</div>

<script>

const query = (localStorage.getItem("query") || "").toLowerCase()

document.getElementById("queryText").innerText =
"Showing results for: " + query

async function loadProducts(){

const res = await fetch("/api/server?action=products")

const data = await res.json()

/* semantic filtering */

const filtered = data.filter(p =>

(p.name + " " + (p.description || ""))
.toLowerCase()
.includes(query)

)

const container = document.getElementById("products")

if(filtered.length === 0){

container.innerHTML =
"<p class='text-gray-500'>No products found</p>"

return

}

filtered.forEach(p => {

container.innerHTML += `

<div class="bg-white p-6 rounded shadow">

<h2 class="text-lg font-semibold mb-2">
${p.name}
</h2>

<p class="text-gray-600 mb-4">
₹${p.price}
</p>

<button
onclick="buy(${p.price})"
class="bg-green-500 text-white px-4 py-2 rounded">
Buy Now
</button>

</div>

`

})

}

async function buy(price){

const res = await fetch("/api/create-order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({amount:price})

})

const data = await res.json()

const options = {

key:data.key,
amount:data.order.amount,
currency:"INR",
order_id:data.order.id,

handler:function(){
alert("Payment Successful")
}

}

const rzp = new Razorpay(options)

rzp.open()

}

loadProducts()

</script>

</body>
</html>
