<!DOCTYPE html>
<html>

<head>

<title>Results</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<nav class="bg-white shadow p-4 flex justify-between">

<div class="font-bold text-xl">
Agentic Wallet
</div>

<div>

<a href="cart.html" class="mr-4 text-blue-500">Cart</a>
<a href="index.html" class="text-blue-500">Voice</a>

</div>

</nav>

<div class="p-10">

<h1 class="text-3xl font-bold mb-6">
Search Results
</h1>

<div id="products" class="grid grid-cols-3 gap-6"></div>

</div>

<script>

const query = localStorage.getItem("query")

async function load(){

const res = await fetch("/api/server?action=products")

const data = await res.json()

const container = document.getElementById("products")

data.forEach(p => {

container.innerHTML += `

<div class="bg-white p-6 rounded shadow">

<h2 class="text-lg font-semibold">
${p.name}
</h2>

<p class="text-gray-500">
₹${p.price}
</p>

<div class="flex gap-3 mt-4">

<button onclick="addCart('${p._id}')"
class="bg-yellow-400 px-3 py-2 rounded">
Add to Cart
</button>

<button onclick="buy(${p.price})"
class="bg-green-500 text-white px-3 py-2 rounded">
Buy Now
</button>

</div>

</div>

`

})

}

async function addCart(id){

const token = localStorage.getItem("token")

await fetch("/api/server?action=addCart",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:token
},

body:JSON.stringify({productId:id})

})

alert("Added to cart")

}

async function buy(price){

const res = await fetch("/api/create-order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({amount:price})

})

const data = await res.json()

const options={

key:data.key,
amount:data.order.amount,
currency:"INR",
order_id:data.order.id,

handler:function(){
alert("Payment Successful")
}

}

const rzp = new Razorpay(options)

rzp.open()

}

load()

</script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
