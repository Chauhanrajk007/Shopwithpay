<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agentic Wallet Demo</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Razorpay Checkout -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-8 max-w-md w-full">

<h1 class="text-2xl font-bold text-center mb-6">
Agentic Wallet Demo
</h1>

<div class="border rounded-xl p-4">

<img 
src="https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7"
class="rounded-lg mb-4"
>

<h2 class="text-xl font-semibold">Gaming Mouse</h2>

<p class="text-gray-600 text-sm mt-1">
High precision RGB gaming mouse
</p>

<div class="flex justify-between items-center mt-4">

<span class="text-lg font-bold">
₹1
</span>

<button
onclick="startPayment()"
class="bg-black text-white px-4 py-2 rounded-lg hover:bg-gray-800"
>
Buy Now
</button>

</div>

</div>

<p class="text-center text-gray-500 text-sm mt-6">
Secure payment powered by Razorpay
</p>

</div>

<script src="script.js"></script>

</body>
</html>
