<!DOCTYPE html>
<html>

<head>

<title>Agentic Wallet</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body class="bg-gray-100">

<div id="root"></div>

<script type="text/babel">

function App(){

const [query,setQuery] = React.useState("")
const [products,setProducts] = React.useState([])
const [showProducts,setShowProducts] = React.useState(false)

async function searchProducts(text){

const res = await fetch("/api/products")

const data = await res.json()

const filtered = data.filter(p =>
p.name.toLowerCase().includes(text.toLowerCase())
)

setProducts(filtered)

setShowProducts(true)

}

function startVoice(){

const recognition = new webkitSpeechRecognition()

recognition.lang = "en-US"

recognition.onresult = e => {

const text = e.results[0][0].transcript

setQuery(text)

searchProducts(text)

}

recognition.start()

}

async function buy(price){

const res = await fetch("/api/create-order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({amount:price})

})

const data = await res.json()

const options={

key:data.key,
amount:data.order.amount,
currency:"INR",
order_id:data.order.id,

handler:function(){

alert("Payment Successful")

}

}

const rzp = new Razorpay(options)

rzp.open()

}

return(

<div className="min-h-screen flex flex-col items-center justify-center">

{/* Voice Search UI */}

{!showProducts && (

<div className="text-center">

<h1 className="text-5xl font-bold mb-8">
Agentic Wallet
</h1>

<p className="text-gray-500 mb-10">
Speak to search products instantly
</p>

<button
onClick={startVoice}
className="bg-blue-600 hover:bg-blue-700 text-white text-3xl w-24 h-24 rounded-full shadow-lg"
>
🎤
</button>

<p className="mt-6 text-gray-400">
Tap microphone and say something like:
<br/>
"gaming mouse"
</p>

</div>

)}

{/* Product Results */}

{showProducts && (

<div className="max-w-6xl mx-auto p-6 w-full">

<h2 className="text-2xl font-bold mb-6">
Results for "{query}"
</h2>

<div className="grid grid-cols-1 md:grid-cols-3 gap-6">

{products.map(p=>(

<div
key={p._id}
className="bg-white p-6 rounded-xl shadow hover:shadow-lg transition"
>

<h3 className="text-lg font-semibold">
{p.name}
</h3>

<p className="text-gray-500 mt-2">
₹{p.price}
</p>

<button
onClick={()=>buy(p.price)}
className="mt-4 bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded"
>
Buy Now
</button>

</div>

))}

</div>

<button
onClick={()=>setShowProducts(false)}
className="mt-10 text-blue-500"
>
← Back to voice search
</button>

</div>

)}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
