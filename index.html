<!DOCTYPE html>
<html>

<head>

<title>Agentic Wallet</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-b from-gray-100 to-gray-200 h-screen flex items-center justify-center">

<div class="text-center">

<h1 class="text-5xl font-bold mb-6">
Agentic Wallet
</h1>

<p class="text-gray-500 mb-10">
Tap and speak what you want
</p>

<button id="mic"
class="bg-blue-600 hover:bg-blue-700 text-white text-4xl w-32 h-32 rounded-full shadow-lg">
🎤
</button>

<p id="status" class="mt-6 text-gray-600">
Tap microphone
</p>

<div class="mt-10">

<a href="login.html" class="text-blue-500 mr-4">Login</a>
<a href="signup.html" class="text-blue-500">Signup</a>

</div>

</div>

<script>

const status = document.getElementById("status")

document.getElementById("mic").onclick = () => {

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition

const recognition = new SpeechRecognition()

recognition.start()

status.innerText = "Listening..."

recognition.onresult = e => {

const text = e.results[0][0].transcript

status.innerText = "Searching: " + text

localStorage.setItem("query",text)

window.location.href = "results.html"

}

}

</script>

</body>
</html>
