<!DOCTYPE html>
<html>

<head>

<title>Agentic Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

<style>

.mic{
width:140px;
height:140px;
border-radius:50%;
background:#2563eb;
color:white;
font-size:50px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
cursor:pointer;
}

</style>

<script>

if(!localStorage.getItem("token")){
window.location.href="auth.html"
}

</script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<nav class="bg-white shadow p-4 flex justify-between">

<div class="font-bold text-xl">
Agentic Wallet
</div>

<div>

<a href="cart.html" class="mr-4 text-blue-500">Cart</a>

<button onclick="logout()" class="text-red-500">
Logout
</button>

</div>

</nav>

<!-- VOICE SEARCH -->

<div class="flex flex-col items-center justify-center h-[80vh] text-center">

<h1 class="text-4xl font-bold mb-4">
Voice Shopping
</h1>

<p class="text-gray-500 mb-10">
Tap the mic and say what you want
</p>

<div id="mic" class="mic">
🎤
</div>

<p id="status" class="mt-6 text-gray-600">
Tap microphone
</p>

</div>

<script>

function logout(){
localStorage.removeItem("token")
window.location.href="auth.html"
}

const status = document.getElementById("status")

document.getElementById("mic").onclick = () => {

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition

const recognition = new SpeechRecognition()

recognition.start()

status.innerText = "Listening..."

recognition.onresult = e => {

const text = e.results[0][0].transcript

status.innerText = "Searching: " + text

localStorage.setItem("query",text)

window.location.href="results.html"

}

}

</script>

</body>
</html>
