<!DOCTYPE html>
<html>

<head>

<title>Agentic Wallet</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

<style>

.mic-container{
display:flex;
justify-content:center;
align-items:center;
margin-top:80px;
}

.mic{

width:140px;
height:140px;

border-radius:50%;

background:#2563eb;

color:white;

font-size:50px;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

}

.mic:hover{
transform:scale(1.05);
transition:0.2s;
}

</style>

<script>

if(!localStorage.getItem("token")){
window.location.href="auth.html"
}

</script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<nav class="bg-white shadow p-4 flex justify-between items-center">

<div class="text-xl font-bold">
Agentic Wallet
</div>

<div class="flex items-center gap-6">

<span id="username" class="text-gray-600"></span>

<a href="cart.html" class="text-blue-500">
Cart
</a>

<button onclick="logout()" class="text-red-500">
Logout
</button>

</div>

</nav>

<!-- VOICE SEARCH -->

<div class="flex flex-col items-center justify-center text-center h-[80vh]">

<h1 class="text-4xl font-bold mb-4">
Voice Shopping
</h1>

<p class="text-gray-500 mb-10">
Tap the mic and say what you want
</p>

<div class="mic-container">

<div id="mic" class="mic">
🎤
</div>

</div>

<p id="status" class="mt-6 text-gray-600">
Tap microphone
</p>

</div>

<script>

/* Show username */

document.getElementById("username").innerText =
"Hi " + localStorage.getItem("name")

/* Logout */

function logout(){

localStorage.removeItem("token")
localStorage.removeItem("name")

window.location.href="auth.html"

}

/* Voice recognition */

const status = document.getElementById("status")

document.getElementById("mic").onclick = () => {

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition

if(!SpeechRecognition){

status.innerText="Voice not supported in browser"
return

}

const recognition = new SpeechRecognition()

recognition.lang="en-US"

recognition.start()

status.innerText="Listening..."

recognition.onresult = e => {

const text = e.results[0][0].transcript

status.innerText="Searching: " + text

localStorage.setItem("query",text)

setTimeout(()=>{
window.location.href="results.html"
},700)

}

recognition.onerror = () => {

status.innerText="Voice error, try again"

}

}

</script>

</body>
</html>
