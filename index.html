<!DOCTYPE html>
<html>

<head>

<title>Agentic Wallet</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="icon" href="data:,">

<style>

body{
font-family: system-ui;
}

/* mic button */

.mic-container{
display:flex;
justify-content:center;
align-items:center;
margin-top:80px;
}

.mic{

width:150px;
height:150px;

border-radius:50%;

background:#2563eb;

color:white;

font-size:55px;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

box-shadow:0 20px 50px rgba(0,0,0,0.25);

transition:0.2s;

}

.mic:hover{
transform:scale(1.05);
}

/* pulse animation */

.pulse{

position:absolute;

width:200px;
height:200px;

border-radius:50%;

background:rgba(37,99,235,0.3);

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:scale(0.8);
opacity:0.7;
}

70%{
transform:scale(1.3);
opacity:0;
}

100%{
opacity:0;
}

}

</style>

<script>

/* login check */

if(!localStorage.getItem("token")){
window.location.href="auth.html"
}

</script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<nav class="bg-white shadow p-4 flex justify-between items-center">

<div class="text-xl font-bold">
Agentic Wallet
</div>

<div class="flex items-center gap-6">

<span id="username" class="text-gray-600"></span>

<button onclick="logout()" class="text-red-500">
Logout
</button>

</div>

</nav>

<!-- MAIN -->

<div class="flex flex-col items-center justify-center text-center h-[80vh]">

<h1 class="text-4xl font-bold mb-4">
Voice Shopping
</h1>

<p class="text-gray-500 mb-10">
Tap the mic and say what you want to buy
</p>

<div class="mic-container relative">

<div class="pulse"></div>

<div id="mic" class="mic">
🎤
</div>

</div>

<p id="status" class="mt-6 text-gray-600">
Tap microphone
</p>

</div>

<script>

/* show username */

document.getElementById("username").innerText =
"Hi " + localStorage.getItem("name")

/* logout */

function logout(){

localStorage.removeItem("token")
localStorage.removeItem("name")

window.location.href="auth.html"

}

/* voice recognition */

const status = document.getElementById("status")

document.getElementById("mic").onclick = () => {

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition

if(!SpeechRecognition){

status.innerText = "Voice not supported in this browser"
return

}

const recognition = new SpeechRecognition()

recognition.lang = "en-US"

recognition.start()

status.innerText = "Listening..."

recognition.onresult = e => {

const text = e.results[0][0].transcript

status.innerText = "Searching: " + text

localStorage.setItem("query",text)

setTimeout(()=>{

window.location.href="results.html"

},700)

}

recognition.onerror = () => {

status.innerText = "Voice error. Try again."

}

}

</script>

</body>
</html>
