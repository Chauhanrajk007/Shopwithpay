<!DOCTYPE html>
<html>

<head>

<title>Agentic Wallet</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

<h1 class="text-3xl font-bold mb-6 text-center">
Agentic Wallet
</h1>

<div id="title" class="text-xl mb-4 text-center">
Login
</div>

<input id="name"
placeholder="Name"
class="border p-3 w-full mb-3 rounded hidden"/>

<input id="email"
placeholder="Email"
class="border p-3 w-full mb-3 rounded"/>

<input id="password"
type="password"
placeholder="Password"
class="border p-3 w-full mb-4 rounded"/>

<button onclick="submitForm()"
class="bg-blue-500 text-white w-full p-3 rounded">
Continue
</button>

<p id="message" class="text-center mt-4 text-gray-600"></p>

<p class="text-center mt-4">

<span id="toggleText">New user?</span>

<a onclick="toggleMode()" class="text-blue-500 cursor-pointer">
Create account
</a>

</p>

</div>

<script>

let mode = "login"

function toggleMode(){

mode = mode === "login" ? "signup" : "login"

document.getElementById("title").innerText =
mode === "login" ? "Login" : "Signup"

document.getElementById("toggleText").innerText =
mode === "login" ? "New user?" : "Already have account?"

document.querySelector("#toggleText + a").innerText =
mode === "login" ? "Create account" : "Login"

document.getElementById("name").classList.toggle("hidden")

}

async function submitForm(){

const name = document.getElementById("name").value
const email = document.getElementById("email").value
const password = document.getElementById("password").value

const res = await fetch(`/api/server?action=${mode}`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name,email,password})

})

const data = await res.json()

const message = document.getElementById("message")

if(data.error){

message.innerText = data.error
return

}

/* AUTO LOGIN */

localStorage.setItem("token",data.token)
localStorage.setItem("name",data.name)

message.innerText = "Welcome " + data.name

setTimeout(()=>{
window.location.href="index.html"
},700)

}

</script>

</body>
</html>
