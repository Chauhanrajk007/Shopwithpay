<!DOCTYPE html>
<html>
<head>

<title>Agentic Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

<h1 class="text-3xl font-bold mb-6 text-center">
Agentic Wallet
</h1>

<div id="form-title" class="text-xl mb-4 text-center">
Login
</div>

<input id="email" placeholder="Email"
class="border p-3 w-full mb-3 rounded"/>

<input id="password" type="password"
placeholder="Password"
class="border p-3 w-full mb-4 rounded"/>

<button onclick="submitForm()"
class="bg-blue-500 text-white w-full p-3 rounded">
Continue
</button>

<p class="text-center mt-4 text-gray-600">
<span id="toggle-text">New user?</span>
<a onclick="toggleMode()" class="text-blue-500 cursor-pointer">
Create account
</a>
</p>

</div>

<script>

let mode = "login"

function toggleMode(){

mode = mode === "login" ? "signup" : "login"

document.getElementById("form-title").innerText =
mode === "login" ? "Login" : "Signup"

document.getElementById("toggle-text").innerText =
mode === "login" ? "New user?" : "Already have account?"

}

async function submitForm(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const res = await fetch(`/api/server?action=${mode}`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email,password})

})

const data = await res.json()

if(mode === "login"){

localStorage.setItem("token",data.token)

window.location.href="index.html"

}else{

alert("Account created. Please login.")

toggleMode()

}

}

</script>

</body>
</html>
